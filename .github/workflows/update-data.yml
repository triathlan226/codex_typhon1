name: Update typhoon data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 */3 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch latest public forecast data
        run: node scripts/update-data.mjs
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update typhoon forecast data"
          file_pattern: data/storm-data.json
